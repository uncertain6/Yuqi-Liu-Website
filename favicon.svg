<svg width="512" height="512" viewBox="0 0 512 512" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Matrix CS favicon</title>
  <desc>Matrix-themed CS favicon with falling green code, hexagon, and code symbol</desc>

  <rect width="512" height="512" fill="#010b01"/>

  <!-- Falling code rain -->
  <text x="30" y="60" font-family="monospace" font-size="18" fill="#00ff41" opacity="0.9">1</text>
  <text x="30" y="82" font-family="monospace" font-size="18" fill="#00ff41" opacity="0.7">0</text>
  <text x="30" y="104" font-family="monospace" font-size="18" fill="#00cc33" opacity="0.5">1</text>
  <text x="30" y="126" font-family="monospace" font-size="18" fill="#009922" opacity="0.3">0</text>
  <text x="30" y="148" font-family="monospace" font-size="18" fill="#006611" opacity="0.15">1</text>

  <text x="55" y="40" font-family="monospace" font-size="18" fill="#00ff41" opacity="0.8">0</text>
  <text x="55" y="62" font-family="monospace" font-size="18" fill="#00ff41" opacity="0.9">1</text>
  <text x="55" y="84" font-family="monospace" font-size="18" fill="#00cc33" opacity="0.6">0</text>
  <text x="55" y="106" font-family="monospace" font-size="18" fill="#009922" opacity="0.35">1</text>
  <text x="55" y="128" font-family="monospace" font-size="18" fill="#006611" opacity="0.2">0</text>

  <text x="430" y="55" font-family="monospace" font-size="18" fill="#00ff41" opacity="0.9">0</text>
  <text x="430" y="77" font-family="monospace" font-size="18" fill="#00cc33" opacity="0.6">1</text>
  <text x="430" y="99" font-family="monospace" font-size="18" fill="#009922" opacity="0.4">0</text>
  <text x="430" y="121" font-family="monospace" font-size="18" fill="#006611" opacity="0.2">1</text>

  <text x="458" y="40" font-family="monospace" font-size="18" fill="#00ff41" opacity="0.8">1</text>
  <text x="458" y="62" font-family="monospace" font-size="18" fill="#00ff41" opacity="0.9">0</text>
  <text x="458" y="84" font-family="monospace" font-size="18" fill="#00cc33" opacity="0.5">1</text>
  <text x="458" y="106" font-family="monospace" font-size="18" fill="#009922" opacity="0.3">1</text>
  <text x="458" y="128" font-family="monospace" font-size="18" fill="#006611" opacity="0.15">0</text>

  <!-- Bottom rain -->
  <text x="30" y="390" font-family="monospace" font-size="18" fill="#009922" opacity="0.3">1</text>
  <text x="30" y="412" font-family="monospace" font-size="18" fill="#006611" opacity="0.15">0</text>
  <text x="55" y="400" font-family="monospace" font-size="18" fill="#006611" opacity="0.2">1</text>
  <text x="430" y="395" font-family="monospace" font-size="18" fill="#009922" opacity="0.3">0</text>
  <text x="458" y="385" font-family="monospace" font-size="18" fill="#006611" opacity="0.18">1</text>

  <!-- Outer hex ring -->
  <polygon points="256,60 376,129 376,267 256,336 136,267 136,129"
    fill="none" stroke="#00551a" stroke-width="10"/>

  <!-- Hex body -->
  <polygon points="256,72 364,133 364,255 256,316 148,255 148,133"
    fill="#010b01" stroke="#00aa22" stroke-width="2.5"/>

  <!-- Circuit grid -->
  <line x1="148" y1="194" x2="364" y2="194" stroke="#003311" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="256" y1="72" x2="256" y2="316" stroke="#003311" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Circuit traces -->
  <polyline points="180,155 180,194 256,194" fill="none" stroke="#00661a" stroke-width="2.5"/>
  <polyline points="332,155 332,194 256,194" fill="none" stroke="#00661a" stroke-width="2.5"/>
  <polyline points="180,233 180,194" fill="none" stroke="#00661a" stroke-width="2.5"/>
  <polyline points="332,233 332,194" fill="none" stroke="#00661a" stroke-width="2.5"/>

  <!-- Circuit nodes -->
  <circle cx="256" cy="194" r="7" fill="#00ff41"/>
  <circle cx="180" cy="155" r="5" fill="#00aa22"/>
  <circle cx="332" cy="155" r="5" fill="#00aa22"/>
  <circle cx="180" cy="233" r="5" fill="#00aa22"/>
  <circle cx="332" cy="233" r="5" fill="#00aa22"/>

  <!-- Hex edge pads -->
  <rect x="242" y="67" width="28" height="10" rx="3" fill="#00ff41"/>
  <rect x="242" y="311" width="28" height="10" rx="3" fill="#00ff41"/>
  <rect x="141" y="187" width="10" height="18" rx="3" fill="#00ff41"/>
  <rect x="361" y="187" width="10" height="18" rx="3" fill="#00ff41"/>

  <!-- Center </> symbol -->
  <text x="256" y="212" text-anchor="middle" font-family="monospace" font-size="72" font-weight="700" fill="#00ff41">&lt;/&gt;</text>

  <!-- Scanlines -->
  <line x1="136" y1="150" x2="376" y2="150" stroke="#00ff41" stroke-width="0.5" opacity="0.06"/>
  <line x1="136" y1="165" x2="376" y2="165" stroke="#00ff41" stroke-width="0.5" opacity="0.06"/>
  <line x1="136" y1="220" x2="376" y2="220" stroke="#00ff41" stroke-width="0.5" opacity="0.06"/>
  <line x1="136" y1="235" x2="376" y2="235" stroke="#00ff41" stroke-width="0.5" opacity="0.06"/>
  <line x1="136" y1="280" x2="376" y2="280" stroke="#00ff41" stroke-width="0.5" opacity="0.06"/>
</svg>
